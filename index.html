<title>词海远征 · WordQuest</title>
<style>
  :root{
    --ink:#0b1026;        /* 夜空底 */
    --ink-2:#141a3a;      /* 卡片底 */
    --ink-3:#1d2550;      /* 抬升面 */
    --gold:#ffcf5c;       /* 主金 */
    --gold-deep:#f5a623;  /* 深金 */
    --mint:#5ce0b8;       /* 正确 */
    --coral:#ff6b6b;      /* 错误 */
    --violet:#9b8cff;     /* 强调紫 */
    --paper:#eef1ff;      /* 主文字 */
    --muted:#8a91c4;      /* 弱文字 */
    --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #25306b 0%, transparent 55%),
      radial-gradient(900px 500px at 10% 110%, #2a1c52 0%, transparent 50%),
      var(--ink);
    color:var(--paper);
    min-height:100vh;
    overflow-x:hidden;
  }
  /* 漂浮星点 */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.5;animation:tw 3s infinite ease-in-out}
  @keyframes tw{0%,100%{opacity:.2}50%{opacity:.9}}

  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:18px 16px 64px}

  /* 顶栏 */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));
    display:grid;place-items:center;font-size:20px;box-shadow:0 6px 18px rgba(245,166,35,.35)}
  .brand h1{font-size:18px;letter-spacing:.5px}
  .brand span{display:block;font-size:11px;color:var(--muted);letter-spacing:2px;font-weight:400}
  .stats{display:flex;gap:8px}
  .chip{background:var(--ink-2);border:1px solid var(--line);border-radius:999px;padding:7px 12px;
    font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
  .chip .ic{font-size:14px}
  .chip.gold{color:var(--gold)}
  .chip.streak{color:var(--coral)}

  /* 等级条 */
  .levelbar{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:18px}
  .levelbar .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .lv{font-weight:700;font-size:15px}
  .lv b{color:var(--gold)}
  .xp{font-size:12px;color:var(--muted)}
  .track{height:9px;background:var(--ink);border-radius:99px;overflow:hidden}
  .fill{height:100%;width:0;background:linear-gradient(90deg,var(--violet),var(--mint));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

  /* 通用卡片标题 */
  .section-title{font-size:13px;letter-spacing:3px;color:var(--muted);margin:6px 4px 12px;text-transform:uppercase}

  /* tabs */
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line);background:var(--ink-2);
    color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;transition:.2s;text-align:center}
  .tab.active{background:linear-gradient(135deg,var(--violet),#6c5ce7);color:#fff;border-color:transparent}

  /* 选择器 */
  .selectors{display:flex;gap:10px;margin-bottom:18px}
  .sel{flex:1}
  .sel label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px}
  select{width:100%;padding:11px 12px;border-radius:11px;background:var(--ink-3);color:var(--paper);
    border:1px solid var(--line);font-size:14px;font-weight:600;appearance:none;cursor:pointer}

  /* 关卡节点地图 */
  .map{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .node{position:relative;background:var(--ink-2);border:1px solid var(--line);border-radius:16px;
    padding:16px 10px;text-align:center;cursor:pointer;transition:.2s;overflow:hidden}
  .node:hover{transform:translateY(-3px);border-color:var(--violet)}
  .node .ring{width:42px;height:42px;border-radius:50%;margin:0 auto 8px;display:grid;place-items:center;
    font-size:18px;font-weight:800;background:var(--ink-3);border:2px solid var(--line)}
  .node.done .ring{background:linear-gradient(135deg,var(--mint),#3bc9a0);border-color:transparent;color:#06231b}
  .node .nm{font-size:12px;font-weight:600}
  .node .cnt{font-size:10px;color:var(--muted);margin-top:3px}
  .node .stars-row{margin-top:6px;font-size:11px;color:var(--gold);height:14px}

  /* 答题区 */
  .quiz{display:none}
  .quiz.show{display:block}
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .qprog{flex:1;height:7px;background:var(--ink-2);border-radius:99px;overflow:hidden;margin:0 12px}
  .qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-deep));width:0;transition:.4s}
  .qexit{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .combo{font-size:13px;font-weight:700;color:var(--coral);min-width:54px;text-align:right}

  .qcard{background:var(--ink-2);border:1px solid var(--line);border-radius:20px;padding:28px 22px;text-align:center}
  .qtype{font-size:11px;letter-spacing:3px;color:var(--violet);margin-bottom:18px}
  .qword{font-size:40px;font-weight:800;letter-spacing:1px;margin-bottom:6px}
  .qphon{font-size:15px;color:var(--muted);margin-bottom:6px}
  .qsub{font-size:14px;color:var(--muted);margin-bottom:24px}
  .speak{background:var(--ink-3);border:1px solid var(--line);color:var(--gold);border-radius:99px;
    padding:8px 16px;font-size:13px;cursor:pointer;margin-bottom:22px}

  .opts{display:grid;gap:11px}
  .opt{padding:15px 18px;border-radius:14px;background:var(--ink-3);border:1px solid var(--line);
    font-size:16px;font-weight:600;cursor:pointer;transition:.15s;text-align:left}
  .opt:hover{border-color:var(--violet)}
  .opt.correct{background:linear-gradient(135deg,var(--mint),#3bc9a0);color:#06231b;border-color:transparent}
  .opt.wrong{background:linear-gradient(135deg,var(--coral),#e74c3c);color:#fff;border-color:transparent}
  .opt.dim{opacity:.4}

  .typewrap{display:flex;gap:10px;margin-top:6px}
  .typewrap input{flex:1;padding:15px 18px;border-radius:14px;background:var(--ink-3);border:1px solid var(--line);
    color:var(--paper);font-size:18px;font-weight:700;text-align:center;letter-spacing:2px}
  .typewrap button{padding:0 22px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-deep));
    color:#3a2400;font-weight:800;cursor:pointer}

  /* 结算 */
  .result{display:none;text-align:center;padding:30px 20px}
  .result.show{display:block}
  .result .big{font-size:60px;margin-bottom:8px}
  .result h2{font-size:26px;margin-bottom:6px}
  .result p{color:var(--muted);margin-bottom:22px}
  .reward-row{display:flex;justify-content:center;gap:14px;margin-bottom:26px;flex-wrap:wrap}
  .reward{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:14px 20px}
  .reward b{display:block;font-size:24px;color:var(--gold)}
  .reward span{font-size:11px;color:var(--muted);letter-spacing:1px}
  .btn{padding:14px 28px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;
    background:linear-gradient(135deg,var(--violet),#6c5ce7);color:#fff}
  .btn.ghost{background:var(--ink-2);border:1px solid var(--line);color:var(--paper);margin-left:10px}

  .board.show{display:block}
  .rank{display:flex;align-items:center;gap:14px;background:var(--ink-2);border:1px solid var(--line);

  .rank.me{border-color:var(--gold);background:linear-gradient(90deg,rgba(255,207,92,.12),var(--ink-2))}
  .rank .pos{width:30px;font-weight:800;font-size:16px;text-align:center;color:var(--muted)}

  .rank .av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:18px;background:var(--ink-3)}
  .rank .info{flex:1}
  .rank .info b{font-size:15px}
  .rank .info span{display:block;font-size:12px;color:var(--muted)}
  .rank .pts{font-weight:800;color:var(--gold)}

  .badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:12px;margin-top:14px}
  .badge{text-align:center;background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:14px 6px;opacity:.35}
  .badge.got{opacity:1;border-color:var(--gold)}
  .badge .em{font-size:28px}
  .badge .bn{font-size:11px;margin-top:6px;color:var(--muted)}
  .badge.got .bn{color:var(--paper)}

  .panel{display:none}.panel.show{display:block}

  /* 飘字 */
  .float{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-size:30px;font-weight:800;
    color:var(--gold);pointer-events:none;z-index:50;animation:floatUp 1s ease-out forwards;text-shadow:0 4px 14px rgba(0,0,0,.4)}
  @keyframes floatUp{0%{opacity:0;transform:translate(-50%,10px) scale(.7)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-60px) scale(1.2)}}

  @media(max-width:520px){.qword{font-size:32px}.stats{flex-direction:column}}
</style>
</head>

/* ============ 状态（localStorage 持久化） ============ */
const STORAGE_KEY = 'wordquest_save';
let S = {
  coins:0, xp:0, level:1, streak:1,
  maxCombo:0, perfects:0, levelsDone:0, wordsLearned:0,
  doneLevels:{}, badges:{}, lastDay:null,
  wrongWords:[]
};

function saveState(){
  const save = {
    S, ME_pts: ME.pts,
    savedAt: new Date().toISOString()
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(save)); }
  catch(e){ /* quota exceeded, ignore */ }
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      // 首次使用，标记今天已签到
      S.lastDay = new Date().toDateString();
      return;
    }
    const save = JSON.parse(raw);
    // 恢复状态
    if(save.S){
      S = Object.assign(S, save.S);
      // 兼容旧存档没有的字段
      if(!S.wrongWords) S.wrongWords = [];
      if(!S.lastDay) S.lastDay = null;
    }
    if(save.ME_pts !== undefined) ME.pts = save.ME_pts;
    // 检查连续天数
    const today = new Date().toDateString();
    if(S.lastDay){
      const yesterday = new Date(Date.now()-86400000).toDateString();
      if(S.lastDay === yesterday){ S.streak++; S.lastDay = today; }
      else if(S.lastDay === today){ /* 今天已签到 */ }
      else { S.streak = 1; S.lastDay = today; }
    } else {
      S.lastDay = today;
    }
    saveState(); // 更新 streak
    return true;
  } catch(e){ return false; }
}

function resetProgress(){
  if(confirm('确定要清除所有学习进度吗？此操作不可恢复！')){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';

function buildGradeSel(){
  const g=document.getElementById('gradeSel'), u=document.getElementById('unitSel');
  g.innerHTML=Object.keys(VOCAB).map(k=>`<option>${k}</option>`).join('');
  g.onchange=()=>{buildUnitSel();renderMap();};
  buildUnitSel();
}
function buildUnitSel(){
  const g=document.getElementById('gradeSel').value, u=document.getElementById('unitSel');
  u.innerHTML=Object.keys(VOCAB[g]).map(k=>`<option>${k}</option>`).join('');
  u.onchange=renderMap;
}
function currentWords(){
  const g=document.getElementById('gradeSel').value, u=document.getElementById('unitSel').value;
  return VOCAB[g][u];
}
function levelKey(i){
  return document.getElementById('gradeSel').value+'|'+document.getElementById('unitSel').value+'|'+i;
}

/* 把单元词按每关5词切关 */
function renderMap(){
  const words=currentWords(), per=5, n=Math.ceil(words.length/per);
  const map=document.getElementById('map'); map.innerHTML='';
  for(let i=0;i<n;i++){
    const key=levelKey(i), rec=S.doneLevels[key];
    const cnt=Math.min(per, words.length-i*per);
    const node=document.createElement('div');
    node.className='node'+(rec?' done':'');
    node.innerHTML=`<div class="ring">${rec?'✓':i+1}</div>
      <div class="nm">第 ${i+1} 关</div>
      <div class="cnt">${cnt} 词</div>
      <div class="stars-row">${rec?'★'.repeat(rec.stars)+'☆'.repeat(3-rec.stars):''}</div>`;
    node.onclick=()=>startLevel(i);
    map.appendChild(node);
  }
}

let Q={words:[], idx:0, combo:0, correct:0, levelIdx:0};

function startLevel(i){
  const words=currentWords(), per=5;
  Q={words:words.slice(i*per, i*per+per), idx:0, combo:0, correct:0, levelIdx:i};
  document.getElementById('map').style.display='none';
  document.querySelector('.selectors').style.display='none';
  document.querySelector('#panel-map .section-title').style.display='none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz').classList.add('show');
  renderQuestion();
}

function distractors(correctWord, field){
  // 从全词库随机取干扰项
  const pool=[];
  for(const g in VOCAB) for(const u in VOCAB[g]) pool.push(...VOCAB[g][u]);
  const others=pool.filter(x=>x[field]!==correctWord[field]);
  const pick=[];
  while(pick.length<3 && others.length){
    const k=Math.floor(Math.random()*others.length);
    pick.push(others.splice(k,1)[0]);
  }
  return pick;
}

function renderQuestion(){
  const card=document.getElementById('qcard');
  const w=Q.words[Q.idx];
  const type=TYPES[Math.floor(Math.random()*TYPES.length)];
  document.getElementById('qprogFill').style.width=(Q.idx/Q.words.length*100)+'%';
  document.getElementById('comboView').textContent=Q.combo>=2?`🔥 ${Q.combo} 连击`:'';

  if(type==="见英选中"){
    const opts=shuffle([w, ...distractors(w,'zh')]);
    card.innerHTML=`<div class="qtype">选出正确的中文</div>
      <div class="qword">${w.w}</div><div class="qphon">${w.ph}</div>
      <div class="opts">${opts.map(o=>`<div class="opt" data-ok="${o.zh===w.zh}">${o.zh}</div>`).join('')}</div>`;
    bindOpts(w);
  }
  else if(type==="见中选英"){
    const opts=shuffle([w, ...distractors(w,'w')]);
    card.innerHTML=`<div class="qtype">选出正确的单词</div>
      <div class="qword" style="font-size:30px">${w.zh}</div>
      <div class="opts">${opts.map(o=>`<div class="opt" data-ok="${o.w===w.w}">${o.w}</div>`).join('')}</div>`;
    bindOpts(w);
  }
  else if(type==="听音选词"){
    const opts=shuffle([w, ...distractors(w,'w')]);
    card.innerHTML=`<div class="qtype">听发音，选单词</div>
      <button class="speak" id="speakBtn">🔊 播放发音</button>
      <div class="opts">${opts.map(o=>`<div class="opt" data-ok="${o.w===w.w}">${o.w}</div>`).join('')}</div>`;
    document.getElementById('speakBtn').onclick=()=>speak(w.w);
    speak(w.w);
    bindOpts(w);
  }
  else if(type==="拼写"){ // 拼写
    card.innerHTML=`<div class="qtype">根据中文拼写单词</div>
      <div class="qword" style="font-size:28px">${w.zh}</div>
      <div class="qsub">${w.ph}　首字母：${w.w[0]}…</div>
      <div class="typewrap">
        <input id="spellInput" autocomplete="off" placeholder="输入英文" />
        <button id="spellBtn">确定</button>
      </div>`;
    const inp=document.getElementById('spellInput');
    inp.focus();
    const submit=()=>judge(inp.value.trim().toLowerCase()===w.w.toLowerCase(), w, null);
    document.getElementById('spellBtn').onclick=submit;
    inp.onkeydown=e=>{if(e.key==='Enter')submit();};
  }
  else if(type==="听写"){ // 听发音，拼写单词
    card.innerHTML=`<div class="qtype">听发音，拼写单词</div>
      <button class="speak" id="speakBtn2">🔊 播放发音 (可重复点击)</button>
      <div class="typewrap" style="margin-top:12px">
        <input id="spellInput" autocomplete="off" placeholder="输入你听到的单词" />
        <button id="spellBtn">确定</button>
      </div>
      <div class="qsub" style="margin-top:8px">提示：首字母 ${w.w[0]}…　共 ${w.w.length} 个字母</div>`;
    document.getElementById('speakBtn2').onclick=()=>speak(w.w);
    speak(w.w);
    const inp=document.getElementById('spellInput');
    inp.focus();
    const submit=()=>judge(inp.value.trim().toLowerCase()===w.w.toLowerCase(), w, null);
    document.getElementById('spellBtn').onclick=submit;
    inp.onkeydown=e=>{if(e.key==='Enter')submit();};
  }
}

function bindOpts(w){
  document.querySelectorAll('.opt').forEach(el=>{
    el.onclick=()=>{
      const ok=el.dataset.ok==='true';
      document.querySelectorAll('.opt').forEach(o=>{
        o.style.pointerEvents='none';
        if(o.dataset.ok==='true')o.classList.add('correct');
        else if(o===el)o.classList.add('wrong');
        else o.classList.add('dim');
      });
      judge(ok, w, el);
    };
  });
}

function judge(ok, w, el){
  if(ok){
    Q.combo++; Q.correct++;
    S.maxCombo=Math.max(S.maxCombo,Q.combo);
    // 错词本：答对了则从错词本移除
    S.wrongWords = S.wrongWords.filter(ww => ww.w !== w.w);
    const gain=10+(Q.combo>=2?Q.combo*2:0);
    floatText('+'+gain+' 🪙');
    addCoins(gain); addXP(8);
  } else {
    Q.combo=0;
    floatText('再背一遍！', 'var(--coral)');
    // 错词本：记录答错的词
    if(!S.wrongWords.find(ww => ww.w === w.w)){
      S.wrongWords.push({w:w.w, ph:w.ph, zh:w.zh, wrongCount:1});
    } else {
      const ww = S.wrongWords.find(ww => ww.w === w.w);
      ww.wrongCount++;
    }
    // 拼写错时给正确答案提示
    if(el===null){
      const card=document.getElementById('qcard');
      const tip=document.createElement('div');
      tip.style.cssText='margin-top:14px;color:var(--mint);font-weight:700;font-size:18px';
      tip.textContent='✓ '+w.w;
      card.appendChild(tip);
      document.getElementById('spellBtn').style.pointerEvents='none';
      document.getElementById('spellInput').disabled=true;
    }
  }
  document.getElementById('comboView').textContent=Q.combo>=2?`🔥 ${Q.combo} 连击`:'';
  setTimeout(next, ok?700:1300);
}

function next(){
  Q.idx++;
  if(Q.idx>=Q.words.length){
    if(REVIEW_MODE){
      REVIEW_MODE = false;
      document.getElementById('quiz').classList.remove('show');
      const total = Q.words.length, correct = Q.correct;
      const r = document.getElementById('result');
      r.classList.add('show');
      r.innerHTML=`
        <div class="big">${correct===total?'🎉':'💪'}</div>
        <h2>错词复习完成</h2>
        <p>答对 ${correct} / ${total}，还剩 ${S.wrongWords.length} 个错词</p>
        <button class="btn" id="againReviewBtn">再复习一轮</button>
        <button class="btn ghost" id="backBtn2">回到地图</button>`;
      document.getElementById('againReviewBtn').onclick=()=>{ r.classList.remove('show'); startReview(); };
      document.getElementById('backBtn2').onclick=backToMap;
      updateReviewBtn();
      saveState();
    } else {
      finishLevel();
    }
  }
  else renderQuestion();
}

function finishLevel(){
  document.getElementById('quiz').classList.remove('show');
  const total=Q.words.length, correct=Q.correct;
  const stars = correct===total?3 : correct>=total*0.6?2 : 1;
  const perfect = correct===total;
  const key=levelKey(Q.levelIdx);

  // 首次通关或刷新更高星
  const prev=S.doneLevels[key];
  if(!prev){ S.levelsDone++; S.wordsLearned+=total; }
  if(!prev || stars>prev.stars) S.doneLevels[key]={stars};
  if(perfect) S.perfects++;

  const bonus = perfect?50:20;
  addCoins(bonus); addXP(perfect?40:25);
  ME.pts += correct*10 + bonus;
  saveState(); // 持久化

  const r=document.getElementById('result');
  r.classList.add('show');
  r.innerHTML=`
    <div class="big">${perfect?'🏆':stars>=2?'🎉':'💪'}</div>
    <h2>${perfect?'完美通关！':stars>=2?'通关成功':'继续加油'}</h2>
    <p>答对 ${correct} / ${total}　${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</p>
    <div class="reward-row">
      <div class="reward"><b>+${correct*10+bonus}</b><span>金币</span></div>
      <div class="reward"><b>+${perfect?40:25}</b><span>经验</span></div>
      <div class="reward"><b>${S.streak}</b><span>连续天数</span></div>
    </div>
    <button class="btn" id="againBtn">再来一关</button>
    <button class="btn ghost" id="backBtn">回到地图</button>`;
  document.getElementById('againBtn').onclick=()=>{
    const n=Math.ceil(currentWords().length/5);
    const nx=(Q.levelIdx+1)%n; r.classList.remove('show'); startLevel(nx);
  };
  document.getElementById('backBtn').onclick=backToMap;
  checkBadges();
}

function backToMap(){
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz').classList.remove('show');
  document.getElementById('map').style.display='grid';
  document.querySelector('.selectors').style.display='flex';
  document.querySelector('#panel-map .section-title').style.display='block';
  renderMap();
}

/* ============ 数值与反馈 ============ */
function addCoins(n){ S.coins+=n; document.getElementById('coinView').textContent=S.coins; }
function addXP(n){
  S.xp+=n;
  while(S.xp>=xpNeed(S.level)){ S.xp-=xpNeed(S.level); S.level++; floatText('🎊 升级 Lv.'+S.level,'var(--violet)'); }
  document.getElementById('lvView').textContent=S.level;
  document.getElementById('titleView').textContent=TITLES[Math.min(S.level-1,TITLES.length-1)];
  document.getElementById('xpView').textContent=S.xp;
  document.getElementById('xpNeedView').textContent=xpNeed(S.level);
  document.getElementById('xpFill').style.width=(S.xp/xpNeed(S.level)*100)+'%';
}
function floatText(t,color){
  const f=document.createElement('div');f.className='float';f.textContent=t;
  if(color)f.style.color=color;document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}
function speak(word){
  if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============ 排行榜（示例同学 + 我，真实多人需后端） ============ */
const ME={name:"我",av:"🦊",pts:0,me:true};
let BOARD=[
  {name:"林小满",av:"🐼",pts:980},
  {name:"陈乐遥",av:"🐯",pts:860},
  {name:"赵子轩",av:"🐰",pts:720},
  {name:"王诗涵",av:"🐨",pts:640},
  ME,
  {name:"刘思源",av:"🐢",pts:430},
  {name:"周可欣",av:"🦁",pts:380}
];
function renderBoard(){
  const list=[...BOARD].sort((a,b)=>b.pts-a.pts);
  const el=document.getElementById('boardList');
  el.innerHTML=list.map((p,i)=>`
    <div class="rank ${p.me?'me':''} ${i===0?'top1':i===1?'top2':i===2?'top3':''}">
      <div class="pos">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
      <div class="av">${p.av}</div>
      <div class="info"><b>${p.name}</b><span>${p.pts} 积分</span></div>
      <div class="pts">${p.pts}</div>
    </div>`).join('');
}

/* ============ 徽章 ============ */
function renderBadges(){
  const g=document.getElementById('badgeGrid');
  g.innerHTML=BADGE_DEFS.map(b=>`
    <div class="badge ${S.badges[b.id]?'got':''}">
      <div class="em">${b.em}</div><div class="bn">${b.name}</div>
    </div>`).join('');
}
function checkBadges(){
  let newOne=false;
  BADGE_DEFS.forEach(b=>{
    if(!S.badges[b.id] && b.cond(S)){ S.badges[b.id]=true; newOne=true; }
  });
  if(newOne){ renderBadges(); floatText('🎖️ 新徽章！','var(--gold)'); }
}

/* ============ 错词复习 ============ */
function updateReviewBtn(){
  const btn = document.getElementById('reviewBtn');
  const cnt = document.getElementById('wrongCount');
  if(S.wrongWords.length > 0){
    btn.style.display = 'inline-block';
    cnt.textContent = S.wrongWords.length;
  } else {
    btn.style.display = 'none';
  }
}

let REVIEW_MODE = false;
function startReview(){
  if(S.wrongWords.length === 0){ alert('没有错词需要复习！🎉'); return; }
  REVIEW_MODE = true;
  const shuffled = shuffle([...S.wrongWords]);
  const per = Math.min(5, shuffled.length);
  Q = {words: shuffled.slice(0, per), idx:0, combo:0, correct:0, levelIdx:0};
  document.getElementById('map').style.display='none';
  document.querySelector('.selectors').style.display='none';
  document.querySelector('#panel-map .section-title').style.display='none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz').classList.add('show');
  document.getElementById('qprogFill').style.width='0%';
  document.getElementById('comboView').textContent='📝 错词复习';
  renderQuestion();
}

// 修改finishLevel，在结尾调用updateReviewBtn
const _origFinishLevel = finishLevel;
finishLevel = function(){
  _origFinishLevel();
  updateReviewBtn();
};

/* ============ Tab 切换 ============ */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('show'));
    t.classList.add('active');
    document.getElementById('panel-'+t.dataset.tab).classList.add('show');
    if(t.dataset.tab==='board')renderBoard();
    if(t.dataset.tab==='badge')renderBadges();
  };
});
document.getElementById('exitBtn').onclick=backToMap;

/* ============ 启动 ============ */
loadState();
initStars();
buildGradeSel();
renderMap();
addXP(0);
addCoins(0);
document.getElementById('streakView').textContent=S.streak;
document.getElementById('lvView').textContent=S.level;
document.getElementById('titleView').textContent=TITLES[Math.min(S.level-1,TITLES.length-1)];
document.getElementById('xpView').textContent=S.xp;
document.getElementById('xpNeedView').textContent=xpNeed(S.level);
document.getElementById('xpFill').style.width=(S.xp/xpNeed(S.level)*100)+'%';
if(S.badges) renderBadges();
updateReviewBtn();

/* 注册 Service Worker（离线缓存） */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
